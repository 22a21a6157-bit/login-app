{% extends "base.html" %}
{% block title %}Complete Your Profile{% endblock %}
{% block content %}
<h2>Complete Your Profile</h2>
<p style="text-align:center; color:#6b7280; font-size:13px;">
  Signed in with Google as {{ name }}. Fill in the rest to finish registering.
</p>
<form method="POST">
  <label for="name_display">Name</label>
  <input type="text" id="name_display" value="{{ name }}" disabled
         style="background:#f3f4f6; color:#6b7280;">

  <label for="email_display">Email</label>
  <input type="text" id="email_display" value="{{ email }}" disabled
         style="background:#f3f4f6; color:#6b7280;">

  <label for="username">Username <span style="color:#9ca3af; font-weight:400;">(your Smart Contract ID -- must be unique)</span></label>
  <input type="text" id="username" name="username" value="{{ suggested_username }}" required>

  <label for="phone">Phone Number <span style="color:#9ca3af; font-weight:400;">(optional)</span></label>
  <input type="text" id="phone" name="phone">

  <label for="address">Address <span style="color:#9ca3af; font-weight:400;">(optional)</span></label>
  <input type="text" id="address" name="address">

  <label for="password">Set a Password</label>
  <input type="password" id="password" name="password" required>
  <div style="font-size:12px; color:#6b7280; margin-top:4px;">
    Min 8 characters, 1 uppercase, 1 lowercase, 1 number, 1 special character.
  </div>
  <label style="display:flex; align-items:center; gap:6px; margin-top:6px; font-weight:400; font-size:13px;">
    <input type="checkbox" onclick="togglePassword()" style="width:auto;"> Show password
  </label>

  <button type="submit">Complete Registration</button>
</form>

<script>
function togglePassword() {
  const field = document.getElementById('password');
  field.type = field.type === 'password' ? 'text' : 'password';
}
</script>
{% endblock %}
